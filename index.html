<!DOCTYPE html>

<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora</title>
    <link rel="stylesheet" href="style.css">
    <link id="page-style" rel="stylesheet" href="">
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>
    <div class="main-container">
        
        <aside class="sidebar" id="sidebar">
            <!-- Header -->
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="assets/images/lumora-logo.png" alt="Logo Lumora" class="lumora-logo">
                    <span class="logo-text">Lumora</span>
                </div>
            </div>

            <!-- Navegação -->
            <nav class="menu-navigation">
                <!-- Item: Home -->
                <div class="menu-item-container">
                    <div class="menu-item active">
                        <div class="item-link">
                            <i class="fa-solid fa-house"></i>
                            <span class="item-text">Home</span>
                        </div>
                    </div>
                </div>

                <!-- Item: RElógios -->
                <div class="menu-item-container">
                    <div class="menu-item">
                        <div class="item-link">
                            <i class="fa-solid fa-clock"></i>
                            <span class="item-text">Relógios</span>
                        </div>
                    </div>
                </div>

                <!-- Item: Planner -->
                <div class="menu-item-container" id="schedule-container">
                    <div class="menu-item">
                        <div class="item-link">
                            <i class="fa-solid fa-calendar-days"></i>
                            <span class="item-text">Planner</span>
                        </div>
                    </div>
                </div>

                <!-- Item: Mapa Interativo -->
                <div class="menu-item-container">
                    <div class="menu-item">
                        <div class="item-link">
                            <i class="fa-solid fa-map"></i>
                            <span class="item-text">Mapa Interativo</span>
                        </div>
                    </div>
                </div>

                <!-- Item: Erupções -->
                <div class="menu-item-container">
                    <div class="menu-item">
                        <div class="item-link">
                            <i class="fa-solid fa-gem"></i>
                            <span class="item-text">Erupções</span>
                        </div>
                    </div>
                </div>

                <!-- Item: Settings -->
                <div class="menu-item-container">
                    <div class="menu-item">
                        <div class="item-link">
                            <i class="fa-solid fa-gear"></i>
                            <span class="item-text">Configurações</span>
                        </div>
                    </div>
                </div>
            </nav>
        </aside>

        <main id="content-area">
        </main>
    </div>

    <script src="main.js"></script>
    <script src="scripts/clocks.js"></script>
</body>
</html>
